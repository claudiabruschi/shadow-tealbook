project:
  type: website
  output-dir: _site

website:
  title: "Shadow Tealbook A"
  navbar:
    left:
      - href: index.qmd
        text: "Tealbook"
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/YOUR_USERNAME/shadow-tealbook
  page-footer:
    left: "Shadow Tealbook A — Purdue University &nbsp;|&nbsp; Data: FRED, BLS, BEA"
    right: "Not an official Federal Reserve publication"

format:
  html:
    theme: cosmo
    toc: false
    code-fold: true
    code-tools: true
    number-sections: false
    smooth-scroll: true
    fig-width: 11
    fig-height: 4.5
    fig-dpi: 150
    page-layout: full

execute:
  freeze: false
  echo: false
  warning: false
  message: false
