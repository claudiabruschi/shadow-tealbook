name: Render and Deploy Shadow Tealbook

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install jupyter ipykernel nbformat nbclient
          pip install -r requirements.txt
          python -m ipykernel install --user
          echo "Python path: $(which python3)"
          echo "Jupyter path: $(which jupyter)"
          python -c "import jupyter; print('jupyter OK')"
          python -c "import ipykernel; print('ipykernel OK')"

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        env:
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QUARTO_PYTHON:     /opt/hostedtoolcache/Python/3.11.15/x64/bin/python3
        run: |
          cd quarto
          quarto render

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quarto/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
