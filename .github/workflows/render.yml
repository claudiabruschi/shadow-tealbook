name: Render and Deploy Shadow Tealbook

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1'   # Every Monday 12pm UTC (8am ET)
  workflow_dispatch:         # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install \
            pandas numpy requests fredapi pyarrow openpyxl \
            plotly kaleido anthropic

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        env:
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd quarto
          quarto render

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quarto/_site   # adjust if your output dir is different

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
